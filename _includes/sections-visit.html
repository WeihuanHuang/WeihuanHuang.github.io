<style>
.visit-list {
  margin-top: 1rem;
}

.visit-item {
  margin: 0 0 1.4rem 0;
  padding: 0.1rem 0 0.1rem 1rem;
  border-left: 3px solid #e3e7ee;
}

.visit-roles {
  margin-left: 1.25rem;
}

.visit-role {
  display: grid;
  grid-template-columns: 11.5rem 1fr;
  column-gap: 0.75rem;
  margin: 0.28rem 0;
  align-items: start;
}

@media (max-width: 768px) {
  .visit-roles {
    margin-left: 0.9rem;
  }

  .visit-role {
    grid-template-columns: 1fr;
    row-gap: 0.1rem;
  }
}
</style>

<div class="visit-list">
  {% for item in site.data.visit %}
    <div class="visit-item">
      <div>{{ item.institution_html }}</div>

      <div class="visit-roles">
        {% for role in item.roles %}
          <div class="visit-role">
            <div>{{ role.date_html }}</div>
            <div>{{ role.position_html }}</div>
          </div>
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>
