<style>
.exp-list {
  margin-top: 1rem;
}

.exp-item {
  margin: 0 0 1.4rem 0;
  padding: 0.1rem 0 0.1rem 1rem;
  border-left: 3px solid #e3e7ee; /* 浅色竖线 */
}

.exp-school {
  font-size: 1.06rem;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 0.35rem;
}

.exp-roles {
  margin-left: 1.25rem;   /* 这一句就是“相对学校名再缩进一层”的关键 */
}

.exp-role {
  margin: 0.28rem 0;
  line-height: 1.5;
}

.exp-dates {
  display: inline-block;
  min-width: 8.6rem;
  color: #6b7280;
}

.exp-title {
  display: inline;
}

@media (max-width: 768px) {
  .exp-dates {
    display: block;
    min-width: 0;
    margin-bottom: 0.05rem;
  }
}
</style>

<div class="exp-list">
  {% for item in site.data.experience %}
    <div class="exp-item">
      <div class="exp-school">{{ item.institution_html }}</div>
      {% for role in item.roles %}
        <div class="exp-role">
          <span class="exp-dates">{{ role.dates }}</span>
          <span class="exp-title">{{ role.title }}</span>
        </div>
      {% endfor %}
    </div>
  {% endfor %}
</div>
